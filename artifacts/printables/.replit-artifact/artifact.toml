kind = "web"
previewPath = "/"
title = "Printables Hub"
version = "1.0.0"
id = "artifacts/printables"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20443

[services.development]
run = "pnpm --filter @workspace/printables run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/printables", "run", "build" ]
publicDir = "artifacts/printables/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20443"
BASE_PATH = "/"
